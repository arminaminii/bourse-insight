<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}بورس اینسایت{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body style="background:#0a0e17;color:#ccd0dc;font-family:'Vazirmatn',sans-serif;direction:rtl;min-height:100vh;display:flex;flex-direction:column;">

    <!-- Navbar -->
    <nav class="bi-nav">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="/" class="bi-brand">
                <i class="fas fa-chart-line me-2"></i>بورس اینسایت
            </a>
            <div class="d-flex gap-3 align-items-center d-none d-md-flex">
                <a href="/" class="bi-nav-link">خانه</a>
                <a href="/search/" class="bi-nav-link">جستجو</a>
                <a href="/companies/" class="bi-nav-link">شرکت‌ها</a>
                <a href="/reports/" class="bi-nav-link">گزارشات</a>
            </div>
            <!-- Mobile menu -->
            <button class="bi-mobile-btn d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#mobileMenu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        <div class="collapse d-md-none" id="mobileMenu">
            <div class="container py-2 d-flex flex-column gap-2">
                <a href="/" class="bi-nav-link">خانه</a>
                <a href="/search/" class="bi-nav-link">جستجو</a>
                <a href="/companies/" class="bi-nav-link">شرکت‌ها</a>
                <a href="/reports/" class="bi-nav-link">گزارشات</a>
            </div>
        </div>
    </nav>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Main Content -->
    <main style="flex:1;">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bi-footer">
        <div class="container">
            <p class="bi-footer-text">
                بورس اینسایت — سامانه هوشمند اطلاعات بورس ایران &copy; ۱۴۰۵
                <span class="ms-2" style="color:#444b5e;">|</span>
                <span class="ms-2">داده‌ها زنده از Codal.ir</span>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
